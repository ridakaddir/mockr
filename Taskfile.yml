version: "3"

vars:
  BINARY: mockr
  MODULE:
    sh: go list -m
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  BUILD_FLAGS: -ldflags="-s -w -X github.com/ridakaddir/mockr/cmd.version={{.VERSION}}"

tasks:

  # ── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build the mockr binary
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.BINARY}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  build:race:
    desc: Build with race detector enabled
    cmds:
      - go build -race {{.BUILD_FLAGS}} -o {{.BINARY}} .

  install:
    desc: Install mockr to $GOPATH/bin
    cmds:
      - go install {{.BUILD_FLAGS}} .

  # ── Run ────────────────────────────────────────────────────────────────────

  run:
    desc: "Run mockr (pass args via CLI_ARGS, e.g. task run -- --config examples/basic)"
    cmds:
      - go run . {{.CLI_ARGS}}

  run:basic:
    desc: Run with the basic example config
    cmds:
      - go run . --config examples/basic

  run:full-crud:
    desc: Run with the full-crud example config
    cmds:
      - go run . --config examples/full-crud

  run:record:
    desc: "Run in record mode (set TARGET env var, e.g. TARGET=https://api.example.com task run:record)"
    cmds:
      - go run . --config examples/record-mode --target {{.TARGET}} --api-prefix /api --record
    requires:
      vars: [TARGET]

  run:grpc-mock:
    desc: Run gRPC basic mock example (UserService on port 50051)
    cmds:
      - go run . --config examples/grpc-mock --grpc-proto examples/grpc-mock/users.proto

  run:grpc-conditions:
    desc: Run gRPC conditions example (OrderService on port 50051)
    cmds:
      - go run . --config examples/grpc-conditions --grpc-proto examples/grpc-conditions/orders.proto

  run:grpc-proxy:
    desc: "Run gRPC proxy example (ProductService; set GRPC_TARGET to forward unmatched methods)"
    cmds:
      - go run . --config examples/grpc-proxy --grpc-proto examples/grpc-proxy/products.proto {{if .GRPC_TARGET}}--grpc-target {{.GRPC_TARGET}}{{end}}

  run:grpc-persist:
    desc: Run gRPC persist example (ItemService stateful CRUD on port 50051)
    cmds:
      - go run . --config examples/grpc-persist --grpc-proto examples/grpc-persist/items.proto

  # ── Test ───────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v -count=1

  test:short:
    desc: Run tests excluding long-running ones
    cmds:
      - go test ./... -short -count=1

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./... -count=1

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out -covermode=atomic
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report written to coverage.html"

  # ── Lint & Format ──────────────────────────────────────────────────────────

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run --fix ./...

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  # ── Dependencies ───────────────────────────────────────────────────────────

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod download
      - go mod tidy

  deps:update:
    desc: Update all dependencies to latest minor/patch versions
    cmds:
      - go get -u ./...
      - go mod tidy

  # ── Generate ───────────────────────────────────────────────────────────────

  generate:
    desc: "Generate mockr config from an OpenAPI spec (SPEC=<file|url> OUT=./mocks)"
    cmds:
      - go run . generate --spec {{.SPEC}} --out {{.OUT | default "mocks"}} {{.CLI_ARGS}}
    requires:
      vars: [SPEC]

  generate:petstore:
    desc: Generate from the OpenAPI Petstore v3 (quick smoke test)
    cmds:
      - go run . generate --spec https://petstore3.swagger.io/api/v3/openapi.json --out /tmp/petstore-mocks

  generate:proto:
    desc: "Generate mockr config from a .proto file (PROTO=<file> OUT=./mocks)"
    cmds:
      - go run . generate --proto {{.PROTO}} --out {{.OUT | default "mocks"}} {{.CLI_ARGS}}
    requires:
      vars: [PROTO]

  generate:proto:example:
    desc: Regenerate the grpc-mock example config from its proto (smoke test)
    cmds:
      - go run . generate --proto examples/grpc-mock/users.proto --out /tmp/grpc-mock-gen

  # ── Release ────────────────────────────────────────────────────────────────

  snapshot:
    desc: Build a local snapshot release with goreleaser (no publish)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Build and publish a release with goreleaser (requires GITHUB_TOKEN)
    cmds:
      - goreleaser release --clean
    requires:
      vars: [GITHUB_TOKEN]

  # ── Dev utilities ──────────────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts and coverage reports
    cmds:
      - rm -f {{.BINARY}} coverage.out coverage.html
      - rm -rf dist/

  check:
    desc: Run fmt, vet, lint, and tests in sequence
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  init:
    desc: Scaffold a mockr.toml template in the current directory
    cmds:
      - go run . --init
