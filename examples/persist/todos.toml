# Stateful todo list — all writes persist to stubs/todos.json on disk
#
# Run:
#   mockr --config examples/persist
#
# Try:
#   # List todos
#   http :4000/api/todos
#
#   # Add a todo (appended to stubs/todos.json)
#   http POST :4000/api/todos id=4 title="Review PR" done:=false
#
#   # Mark done (full replace — id resolved from path wildcard)
#   http PUT :4000/api/todos/2 id=2 title="Write unit tests" done:=true
#
#   # Partial update
#   http PATCH :4000/api/todos/1 done:=true
#
#   # Delete (id from path wildcard)
#   http DELETE :4000/api/todos/3
#
#   # Not found → 404
#   http DELETE :4000/api/todos/99
#
# Reset stub:
#   git checkout examples/persist/stubs/todos.json

[[routes]]
method   = "GET"
match    = "/api/todos"
enabled  = true
fallback = "success"

  [routes.cases.success]
  status = 200
  file   = "stubs/todos.json"


[[routes]]
method   = "POST"
match    = "/api/todos"
enabled  = true
fallback = "created"

  [routes.cases.created]
  status    = 201
  file      = "stubs/todos.json"
  persist   = true
  merge     = "append"
  array_key = "todos"


[[routes]]
method   = "PUT"
match    = "/api/todos/*"
enabled  = true
fallback = "updated"

  [routes.cases.updated]
  status    = 200
  file      = "stubs/todos.json"
  persist   = true
  merge     = "replace"
  key       = "id"
  array_key = "todos"


[[routes]]
method   = "PATCH"
match    = "/api/todos/*"
enabled  = true
fallback = "patched"

  [routes.cases.patched]
  status    = 200
  file      = "stubs/todos.json"
  persist   = true
  merge     = "replace"
  key       = "id"
  array_key = "todos"


[[routes]]
method   = "DELETE"
match    = "/api/todos/*"
enabled  = true
fallback = "deleted"

  [routes.cases.deleted]
  status    = 204
  file      = "stubs/todos.json"
  persist   = true
  merge     = "delete"
  key       = "id"
  array_key = "todos"
