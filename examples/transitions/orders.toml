# Request-time transitions example — simulate order lifecycle state changes
#
# Each GET request checks elapsed time since the first request and serves
# the appropriate case. The response changes automatically over time.
# This is "request-time" mode: the transition is evaluated on each read.
#
# Timeline (from first request):
#   t = 0s   → shipped         (lasts 30 seconds)
#   t = 30s  → out_for_delivery (lasts 60 seconds)
#   t = 90s  → delivered       (terminal — stays here)
#
# Run:
#   mockr --config examples/transitions
#
# Try (watch the status change as time passes):
#   watch -n 5 'http :4000/orders/o123'
#
# Or manually:
#   http :4000/orders/o123    # shipped
#   # wait 30 seconds
#   http :4000/orders/o123    # out_for_delivery
#   # wait 60 more seconds
#   http :4000/orders/o123    # delivered
#
# Reset by touching the config file (triggers hot reload):
#   touch examples/transitions/orders.toml

[[routes]]
method   = "GET"
match    = "/orders/*"
enabled  = true
fallback = "shipped"

  [[routes.transitions]]
  case     = "shipped"
  duration = 30            # serve for 30 seconds, then advance

  [[routes.transitions]]
  case     = "out_for_delivery"
  duration = 60            # serve for 60 seconds, then advance

  [[routes.transitions]]
  case     = "delivered"
  # no duration — terminal state

  [routes.cases.shipped]
  status = 200
  json   = '{"number": "o123", "status": "shipped", "eta": "2-3 days"}'

  [routes.cases.out_for_delivery]
  status = 200
  json   = '{"number": "o123", "status": "out_for_delivery", "eta": "today"}'

  [routes.cases.delivered]
  status = 200
  json   = '{"number": "o123", "status": "delivered", "eta": null}'


