# Stateful todo list with BARE ARRAY stubs — maintains exact API contract
#
# Key difference: stubs/todos-bare.json is a bare array [{}...], 
# not wrapped in {"todos": [...]}. This means GET /api/todos
# returns the exact same format as POST/PUT/PATCH/DELETE operations expect.
#
# Run:
#   mockr --config examples/bare-array-persist
#
# Try:
#   # List todos → returns bare array: [{"id":"1",...}, ...]
#   http :4000/api/todos
#
#   # Add a todo (appended to bare array)
#   http POST :4000/api/todos id=4 title="Review PR" done:=false
#
#   # Update todo (operates on bare array)
#   http PUT :4000/api/todos/2 id=2 title="Write unit tests" done:=true
#
#   # Delete todo (removes from bare array)
#   http DELETE :4000/api/todos/3
#
# Reset stub:
#   git checkout examples/bare-array-persist/stubs/todos-bare.json

[[routes]]
method   = "GET"
match    = "/api/todos"
enabled  = true
fallback = "success"

  [routes.cases.success]
  status = 200
  file   = "stubs/todos-bare.json"


[[routes]]
method   = "POST"
match    = "/api/todos"
enabled  = true
fallback = "created"

  [routes.cases.created]
  status  = 201
  file    = "stubs/todos-bare.json"
  persist = true
  merge   = "append"
  # array_key omitted — file is a bare JSON array


[[routes]]
method   = "PUT"
match    = "/api/todos/*"
enabled  = true
fallback = "updated"

  [routes.cases.updated]
  status  = 200
  file    = "stubs/todos-bare.json"
  persist = true
  merge   = "replace"
  key     = "id"
  # array_key omitted — operates on bare array


[[routes]]
method   = "PATCH"
match    = "/api/todos/*"
enabled  = true
fallback = "patched"

  [routes.cases.patched]
  status  = 200
  file    = "stubs/todos-bare.json"
  persist = true
  merge   = "replace"
  key     = "id"
  # array_key omitted — merges with bare array record


[[routes]]
method   = "DELETE"
match    = "/api/todos/*"
enabled  = true
fallback = "deleted"

  [routes.cases.deleted]
  status  = 204
  file    = "stubs/todos-bare.json"
  persist = true
  merge   = "delete"
  key     = "id"
  # array_key omitted — removes from bare array