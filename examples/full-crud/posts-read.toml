# GET /api/posts — list posts with condition-based filtering and simulation
#
# Run:
#   mockr --config examples/full-crud
#
# Try:
#   # All posts
#   http :4000/api/posts
#
#   # Published only (query param condition)
#   http ':4000/api/posts?status=published'
#
#   # Simulate slow network (test loading spinner)
#   http ':4000/api/posts?simulate=slow'
#
#   # Simulate server error (test error UI)
#   http ':4000/api/posts?simulate=error'

[[routes]]
method   = "GET"
match    = "/api/posts"
enabled  = true
fallback = "all"

  [[routes.conditions]]
  source = "query"
  field  = "simulate"
  op     = "eq"
  value  = "slow"
  case   = "slow"

  [[routes.conditions]]
  source = "query"
  field  = "status"
  op     = "eq"
  value  = "published"
  case   = "published_only"

  [[routes.conditions]]
  source = "query"
  field  = "simulate"
  op     = "eq"
  value  = "error"
  case   = "error"

  [routes.cases.all]
  status = 200
  file   = "stubs/posts.json"

  [routes.cases.published_only]
  status = 200
  json   = '{"posts": [{"id": "1", "title": "Getting started with mockr", "published": true}]}'

  [routes.cases.slow]
  status = 200
  file   = "stubs/posts.json"
  delay  = 3

  [routes.cases.error]
  status = 500
  json   = '{"error": "Internal Server Error", "code": "DB_TIMEOUT"}'
